name: Discover private courts

# Manually-triggered discovery of private/commercial pickleball venues.
# Runs the discovery script(s), then opens a PULL REQUEST containing the
# updated private-courts-candidates.json for you to review. It never edits
# courts-data.js — you vet candidates and move the good ones in yourself.
#
# Setup (one time):
#   1. Settings → Secrets and variables → Actions:
#        Secret  GOOGLE_PLACES_API_KEY   (required for the Google Places source)
#   2. Settings → Actions → General → Workflow permissions:
#        enable "Allow GitHub Actions to create and approve pull requests"

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Discovery source"
        type: choice
        options:
          - google-places
          - openstreetmap
          - both
        default: google-places
      max_pages:
        description: "Google Places: pages per tile (1-3, ~20 results each)"
        required: false
        default: '2'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: discover-private-courts
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run discovery
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          SOURCE: ${{ github.event.inputs.source }}
          MAX_PAGES: ${{ github.event.inputs.max_pages }}
        run: |
          set -e
          # OpenStreetMap first (it (re)creates the file); Places then merges in.
          if [ "$SOURCE" = "openstreetmap" ] || [ "$SOURCE" = "both" ]; then
            python3 discover_courts_osm.py
          fi
          if [ "$SOURCE" = "google-places" ] || [ "$SOURCE" = "both" ]; then
            if [ -z "$GOOGLE_PLACES_API_KEY" ]; then
              echo "::error::GOOGLE_PLACES_API_KEY secret is not set."
              exit 1
            fi
            python3 discover_courts_places.py --max-pages "${MAX_PAGES:-2}"
          fi

      - name: Open a review PR with the candidates
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          if [ -z "$(git status --porcelain private-courts-candidates.json)" ]; then
            echo "No new candidates — nothing to open a PR for."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="discovery/candidates-${GITHUB_RUN_ID}"
          git checkout -b "$BRANCH"
          git add private-courts-candidates.json
          git commit -m "Discovery: refresh private-courts-candidates.json (${{ github.event.inputs.source }})"
          git push -u origin "$BRANCH"
          COUNT=$(python3 -c "import json;print(len(json.load(open('private-courts-candidates.json'))))" 2>/dev/null || echo "?")
          gh pr create --base main --head "$BRANCH" \
            --title "Private-court discovery candidates ($COUNT)" \
            --body "Auto-generated by the **Discover private courts** workflow (source: \`${{ github.event.inputs.source }}\`).

          Review the venues in \`private-courts-candidates.json\`, verify their details (court count, indoor/outdoor, access), then move the good ones into \`courts-data.js\` (add a \`website\` for the booking button).

          ⚠️ Merging this PR only updates the candidates file — it does **not** add courts to the live app."
